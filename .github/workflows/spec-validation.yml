name: Spec Validation

on:
  pull_request:
    branches:
      - main

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md

  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required core spec files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "spec/report-schema.md"
            "spec/taxonomy.md"
            "spec/severity.md"
            "spec/scenario-format.md"
            "spec/ci-policy.md"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ -f "$file" ]]; then
              echo "✅ Found required spec file: $file"
            else
              echo "❌ Missing required spec file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Schema validation failed: one or more required spec files are missing."
            exit 1
          fi

          echo "All required core spec files are present."

  validate-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required example files exist
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "examples/report-example.json"
            "examples/scenario-prompt-injection-example.yaml"
            "examples/scenario-tool-abuse-example.yaml"
            "examples/scenario-data-exfiltration-example.yaml"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ -f "$file" ]]; then
              echo "✅ Found required example file: $file"
            else
              echo "❌ Missing required example file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Example validation failed: one or more required example files are missing."
            exit 1
          fi

          echo "All required example files are present."

      - name: Validate report example JSON syntax
        shell: bash
        run: |
          set -euo pipefail
          jq empty examples/report-example.json
          echo "✅ JSON syntax is valid: examples/report-example.json"

      - name: Install YAML parser
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet pyyaml

      - name: Validate scenario example YAML syntax
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import yaml

          paths = [
            "examples/scenario-prompt-injection-example.yaml",
            "examples/scenario-tool-abuse-example.yaml",
            "examples/scenario-data-exfiltration-example.yaml",
          ]

          for path in paths:
            with open(path, "r", encoding="utf-8") as f:
              yaml.safe_load(f)
            print(f"✅ YAML syntax is valid: {path}")
          PY
